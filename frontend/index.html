<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satellite Change Detection</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Leaflet Draw CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
    
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            overflow: hidden;
        }
        #sidebar {
            width: 350px;
            background-color: #1e1e1e;
            padding: 20px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 1000;
            overflow-y: auto;
        }
        #map {
            flex-grow: 1;
            background-color: #000;
            z-index: 1;
        }
        h2 {
            margin-top: 0;
            font-size: 1.5rem;
            color: #ffffff;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        label {
            font-size: 0.9rem;
            color: #b0b0b0;
        }
        input[type="text"] {
            background-color: #2d2d2d;
            border: 1px solid #444;
            color: #fff;
            padding: 8px;
            border-radius: 4px;
            font-size: 0.9rem;
        }
        button {
            background-color: #007acc;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #005999;
        }
        button:disabled {
            background-color: #444;
            color: #888;
            cursor: not-allowed;
        }
        .panel {
            background-color: #252525;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 15px;
            margin-top: 10px;
        }
        .panel h3 {
            margin-top: 0;
            font-size: 1.1rem;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #status-display {
            font-family: monospace;
            color: #4caf50;
            word-wrap: break-word;
        }
        #alerts-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .alert-card {
            background-color: #4a1414;
            border-left: 4px solid #f44336;
            padding: 10px;
            border-radius: 3px;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>Change Detector</h2>
        
        <div class="form-group">
            <label for="t1-folder">T1 Folder Path (Before)</label>
            <input type="text" id="t1-folder" placeholder="e.g. data/t1" value="data/t1">
        </div>
        
        <div class="form-group">
            <label for="t2-folder">T2 Folder Path (After)</label>
            <input type="text" id="t2-folder" placeholder="e.g. data/t2" value="data/t2">
        </div>

        <button id="draw-btn">Draw AOI on Map</button>
        <button id="run-btn" disabled>Run Detection</button>

        <div class="panel">
            <h3>Status</h3>
            <div id="status-display">Waiting for input...</div>
            <div id="task-id" style="font-size: 0.8rem; color: #888; margin-top: 5px;"></div>
        </div>

        <div class="panel">
            <h3>Alerts <span id="alert-count" style="background: #f44336; color: white; border-radius: 50%; padding: 2px 8px; font-size: 0.8rem; display: none;">0</span></h3>
            <div id="alerts-container">
                <div style="color: #888; font-size: 0.9rem;">No alerts yet.</div>
            </div>
        </div>
    </div>

    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Leaflet Draw JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

    <script>
        const API_BASE = "http://localhost:8000/api/v1";
        let drawnLayer = null;
        let pollInterval = null;
        let geojsonLayer = null;

        // Initialize Map centered on India (lat: 20, lng: 78, zoom: 5)
        const map = L.map('map').setView([20, 78], 5);

        // Add Dark Matter CartoDB tiles for a clean minimal dark UI
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        // Initialize FeatureGroup to store editable layers
        const drawnItems = new L.FeatureGroup();
        map.addLayer(drawnItems);

        // Initialize Draw Control (We hide the default UI toolbar to use our custom button)
        const drawControl = new L.Control.Draw({
            draw: {
                polyline: false,
                marker: false,
                circlemarker: false,
                circle: false,
                polygon: true,
                rectangle: true
            },
            edit: {
                featureGroup: drawnItems,
                edit: false,
                remove: true
            }
        });

        // Trigger drawing a polygon when clicking the custom sidebar button
        document.getElementById('draw-btn').addEventListener('click', () => {
            new L.Draw.Polygon(map, drawControl.options.draw.polygon).enable();
        });

        map.on(L.Draw.Event.CREATED, function (e) {
            drawnItems.clearLayers(); // Only allow one AOI to be drawn at a time
            drawnLayer = e.layer;
            drawnItems.addLayer(drawnLayer);
            document.getElementById('run-btn').disabled = false;
            document.getElementById('draw-btn').innerText = "Redraw AOI";
        });

        map.on(L.Draw.Event.DELETED, function () {
            drawnLayer = null;
            document.getElementById('run-btn').disabled = true;
            document.getElementById('draw-btn').innerText = "Draw AOI on Map";
        });

        // Run Detection Logic
        document.getElementById('run-btn').addEventListener('click', async () => {
            const t1Folder = document.getElementById('t1-folder').value.trim();
            const t2Folder = document.getElementById('t2-folder').value.trim();

            if (!t1Folder || !t2Folder || !drawnLayer) {
                alert("Please provide both folder paths and draw an AOI on the map.");
                return;
            }

            // Extract GeoJSON geometry from the drawn Leaflet layer
            const geojson = drawnLayer.toGeoJSON();
            
            const payload = {
                aoi: {
                    name: "Web Portal AOI",
                    geom: geojson.geometry
                },
                t1_folder: t1Folder,
                t2_folder: t2Folder
            };

            try {
                updateStatus("Submitting task...", "yellow");
                document.getElementById('run-btn').disabled = true;

                const response = await fetch(`${API_BASE}/detect-change`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                
                const data = await response.json();
                const taskId = data.task_id;
                
                updateStatus("Processing...", "#ff9800");
                document.getElementById('task-id').innerText = `Task ID: ${taskId}`;

                // Clear previous results from the map
                if (geojsonLayer) {
                    map.removeLayer(geojsonLayer);
                    geojsonLayer = null;
                }

                // Start polling every 3 seconds
                if (pollInterval) clearInterval(pollInterval);
                pollInterval = setInterval(() => pollStatus(taskId), 3000);

            } catch (error) {
                updateStatus("Error submitting task", "red");
                console.error(error);
                document.getElementById('run-btn').disabled = false;
            }
        });

        // Poll Task Status from Backend
        async function pollStatus(taskId) {
            try {
                const response = await fetch(`${API_BASE}/results/${taskId}`);
                if (!response.ok) throw new Error("Failed to fetch status");
                
                const data = await response.json();
                
                if (data.status === 'complete') {
                    clearInterval(pollInterval);
                    updateStatus(`Complete! Area: ${data.changed_area_km2.toFixed(4)} km²`, "#4caf50");
                    document.getElementById('run-btn').disabled = false;
                    
                    // Attempt to fetch the generated GeoJSON to display on the map
                    if (data.geojson_path) {
                        loadResultGeoJSON(data.geojson_path);
                    }
                    
                    fetchAlerts(); // Immediately refresh alerts panel
                } else if (data.status === 'failed') {
                    clearInterval(pollInterval);
                    updateStatus("Task Failed (check logs)", "red");
                    document.getElementById('run-btn').disabled = false;
                } else {
                    // Update UI with current status (e.g. 'processing')
                    updateStatus(`Status: ${data.status}...`, "#ff9800");
                }
            } catch (error) {
                console.error("Polling error:", error);
            }
        }

        function updateStatus(text, color) {
            const el = document.getElementById('status-display');
            el.innerText = text;
            el.style.color = color;
        }

        // Fetch and render the resulting GeoJSON change polygons
        async function loadResultGeoJSON(localPath) {
            try {
                // If FastAPI isn't configured to serve static files, this fetch will fail CORS/404.
                // Assuming it's exposed or testing locally using a relative path wrapper.
                // Convert Windows backslashes if present
                const cleanPath = localPath.replace(/\\/g, '/');
                
                // If running locally, you might need to adjust the path to point to your static endpoint
                // e.g. http://localhost:8000/outputs/...
                // Here we construct a relative path assuming the frontend runs alongside it
                const url = `http://localhost:8000/${cleanPath}`; 

                const response = await fetch(url);
                if (!response.ok) throw new Error("GeoJSON not found at URL");
                
                const geojsonData = await response.json();
                
                geojsonLayer = L.geoJSON(geojsonData, {
                    style: { 
                        color: '#ff0000', 
                        weight: 2, 
                        fillColor: '#ff0000', 
                        fillOpacity: 0.5 
                    },
                    onEachFeature: function (feature, layer) {
                        if (feature.properties && feature.properties.area_km2 !== undefined) {
                            layer.bindPopup(`<strong>Change Detected</strong><br>Area: ${feature.properties.area_km2.toFixed(4)} km²`);
                        }
                    }
                }).addTo(map);
                
                // Zoom map to fit the change polygons
                map.fitBounds(geojsonLayer.getBounds());
            } catch (err) {
                console.warn("Could not load GeoJSON to map. Ensure the backend serves the 'outputs/' directory statically.", err);
            }
        }

        // Fetch Unacknowledged Alerts from Backend
        async function fetchAlerts() {
            try {
                const response = await fetch(`${API_BASE}/alerts`);
                if (!response.ok) return;
                
                const alerts = await response.json();
                const container = document.getElementById('alerts-container');
                const badge = document.getElementById('alert-count');
                
                if (alerts.length === 0) {
                    container.innerHTML = '<div style="color: #888; font-size: 0.9rem;">No alerts yet.</div>';
                    badge.style.display = 'none';
                    return;
                }
                
                badge.innerText = alerts.length;
                badge.style.display = 'inline';
                
                container.innerHTML = '';
                alerts.forEach(alert => {
                    const div = document.createElement('div');
                    div.className = 'alert-card';
                    const time = new Date(alert.triggered_at).toLocaleTimeString();
                    div.innerHTML = `<strong>${time}</strong><br>${alert.message}`;
                    container.appendChild(div);
                });
            } catch (err) {
                console.error("Failed to fetch alerts", err);
            }
        }

        // Periodically check for new alerts every 10 seconds
        setInterval(fetchAlerts, 10000);

    </script>
</body>
</html>
